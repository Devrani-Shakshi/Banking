<div>
<h3>Transaction History</h3>
  <table>
    <tr>
      <th>Date</th>
      <th>Description</th>
      <th>Type</th>
      <th>Amount</th>
    </tr>
    <tr *ngFor="let item of history">
      <td>{{ item.transactionDate | date:'short' }}</td>
      <td>{{ item.description }}</td>
      <td [style.color]="item.type === 'Credit' ? 'green' : 'red'">{{ item.type }}</td>
      <td>${{ item.amount }}</td>
    </tr>
  </table>
</div>
