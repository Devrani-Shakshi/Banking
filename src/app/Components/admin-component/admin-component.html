<div class="container-fluid py-4 bg-light min-vh-100">
    <div class="row">
        <!-- LEFT SIDE: FORM -->
        <div class="col-lg-6">
            <div class="card shadow-sm border-0 sticky-top" style="top: 20px">
                <div class="card-header bg-primary text-white py-3">
                    <h5 class="mb-0">
                        <i class="fas" [ngClass]="isEditMode ? 'fa-user-edit' : 'fa-user-plus'"></i>
                        {{ isEditMode ? 'Update User Details' : 'Register New User' }}
                    </h5>
                </div>
                <div class="card-body p-4">
                    <form (ngSubmit)="onSubmit()" #userForm="ngForm">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Email Address</label>
                            <input type="email" class="form-control" name="email" [(ngModel)]="userModel.email" required
                                placeholder="name@bank.com" />
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Password</label>
                            <input type="password" class="form-control" name="password" [(ngModel)]="userModel.password"
                                [required]="!isEditMode" placeholder="••••••••" />
                            <small class="text-muted" *ngIf="isEditMode">Leave blank to keep current password</small>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">User Role</label>
                                <select class="form-select" name="role" [(ngModel)]="userModel.role">
                                    <option value="User">User</option>
                                    <option value="Admin">Admin</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Initial Balance</label>
                                <div class="input-group">
                                    <span class="input-group-text">$</span>
                                    <input type="number" class="form-control" name="balance"
                                        [(ngModel)]="userModel.balance" />
                                </div>
                            </div>
                        </div>

                        <div class="d-grid gap-2 mt-4">
                            <button type="submit" class="btn btn-primary shadow-sm" [disabled]="!userForm.valid">
                                {{ isEditMode ? 'Save Changes' : 'Create Account' }}
                            </button>
                            <button type="button" class="btn btn-link text-secondary" (click)="resetForm()"
                                *ngIf="isEditMode">
                                Cancel Edit
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- RIGHT SIDE: TABLE -->
        <div class="col-lg-6">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
                    <h5 class="mb-0 text-dark"><i class="fas fa-list"></i> User Directory</h5>
                    <span class="badge bg-soft-primary text-primary">{{ users.length }} Total Users</span>
                </div>
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="bg-light text-muted">
                            <tr>
                                <th class="ps-4">User</th>
                                <th>Role</th>
                                <th>Balance</th>
                                <th class="text-end pe-4">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr *ngFor="let u of users">
                                <td class="ps-4">
                                    <div class="d-flex align-items-center">
                                        <div class="avatar-sm bg-info text-white rounded-circle me-3 text-center"
                                            style="width: 35px; height: 35px; line-height: 35px">
                                            {{ u.email.charAt(0).toUpperCase() }}
                                        </div>
                                        <span>{{ u.email }}</span>
                                    </div>
                                </td>
                                <td>
                                    <span class="badge rounded-pill"
                                        [ngClass]="u.role === 'Admin' ? 'bg-danger-soft' : 'bg-primary-soft'">
                                        {{ u.role }}
                                    </span>
                                </td>
                                <td class="fw-bold text-success">${{ u.balance | number: '1.2-2' }}</td>
                                <td class="text-end pe-4">
                                    <button class="btn  btn-light me-2 bg-info" (click)="editUser(u)" title="Edit">
                                       Edit
                                    </button>
                                    <button class="btn  btn-light bg-danger-soft" (click)="deleteUser(u.id!)" title="Delete">
                                       Delete
                                    </button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
